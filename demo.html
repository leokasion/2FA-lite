<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>2FA-Lite | Security Gate</title>
    <style>
        :root {
            --bg: #f0f2f5;
            --card: #ffffff;
            --primary: #2563eb; /* Cyber Blue */
            --text: #1e293b;
            --accent: #64748b;
        }
        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: var(--card); 
            padding: 40px; 
            border-radius: 2px; /* Sharp corners for a more serious feel */
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); 
            text-align: center; 
            width: 350px; 
            border-top: 4px solid var(--primary); 
        }
        h2 { 
            font-weight: 700; 
            letter-spacing: -0.025em; 
            margin-bottom: 8px;
            text-transform: uppercase;
            font-size: 1.2rem;
        }
        .subtitle { color: var(--accent); font-size: 0.9rem; margin-bottom: 24px; }
        img { 
            background: white; 
            padding: 12px; 
            border: 1px solid #e2e8f0;
            margin-bottom: 24px; 
            width: 180px; 
        }
        input { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            border-radius: 4px;
            font-size: 1.5rem; 
            text-align: center; 
            letter-spacing: 8px;
            box-sizing: border-box;
        }
        button { 
            width: 100%;
            margin-top: 20px; 
            padding: 14px; 
            background: var(--primary); 
            border: none; 
            color: white; 
            font-weight: 600; 
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
        .footer-info { font-size: 0.7rem; color: #94a3b8; margin-top: 24px; text-align: left; border-top: 1px solid #f1f5f9; padding-top: 12px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Identity Verification</h2>
        <p class="subtitle">Multi-factor authentication required</p>
        
        <img src="http://localhost:5010/provision/OR442PYFSUEUUSDXG6JUZKSHAFOP4DUF" alt="QR Code">
        
        <form>
            <input type="text" maxlength="6" placeholder="******" id="otpCode">
            <button type="button">VERIFY SYSTEM ACCESS</button>
        </form>
        
        <div class="footer-info">
            <strong>Endpoint:</strong> 2FA-Lite Microservice<br>
            <strong>Status:</strong> Encrypted Connection
        </div>
    </div>
</body>
</html>
